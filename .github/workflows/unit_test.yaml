name: unit tests
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: |
          # Exclude the integration tests
          go test ./internal/...
