name: unit tests
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: |
          # Exclude Docker-backed integration tests in ./test.
          go test ./apis/... ./cmd/... ./internal/... ./pkg/...
