services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hmsds
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hmsds"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rcs-network

  vault:
    image: hashicorp/vault:1.21
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "hms"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rcs-network
      - console-network

  vault-kv-enabler:
    build:
      context: .
      dockerfile: vault-kv-enabler.dockerfile
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "hms"
      KV_STORES: "hms-creds"
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - rcs-network

  smd-init:
    image: ghcr.io/openchami/smd:v2.19.2
    environment:
      SMD_DBHOST: "postgres"
      SMD_DBPORT: "5432"
      SMD_DBNAME: "hmsds"
      SMD_DBUSER: "postgres"
      SMD_DBPASS: "postgres"
      SMD_DBOPTS: "sslmode=disable"
    command: ["/smd-init"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rcs-network

  smd:
    image: ghcr.io/openchami/smd:v2.19.2
    environment:
      SMD_DBHOST: "postgres"
      SMD_DBPORT: "5432"
      SMD_DBNAME: "hmsds"
      SMD_DBUSER: "postgres"
      SMD_DBPASS: "postgres"
      SMD_DBOPTS: "sslmode=disable"
      SMD_JWKS_URL: ""
      CRAY_VAULT_AUTH_PATH: "auth/token/create"
      CRAY_VAULT_ROLE_FILE: "/configs/namespace"
      CRAY_VAULT_JWT_FILE: "/configs/token"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "hms"
      VAULT_KEYPATH: "hms-creds"
      SMD_WVAULT: "true"
      SMD_RVAULT: "true"
      SMD_SLS_HOST: ""
      SMD_HBTD_HOST: ""
      ENABLE_DISCOVERY: "true"
    volumes:
      - ./configs/namespace:/configs/namespace:ro
      - ./configs/token:/configs/token:ro
    ports:
      - "27779:27779"
    depends_on:
      smd-init:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    networks:
      - rcs-network
      - rf-network

  redfish-emulator:
    image: ghcr.io/openchami/csm-rie:v1.6.7
    hostname: x0c0s1b0
    environment:
      MOCKUPFOLDER: "ssh"
      MAC_SCHEMA: "Mountain"
      XNAME: "x0c0s1b0"
      PORT: "443"
      AUTH_CONFIG: "ADMIN:ADMIN:Administrator;operator:operator_password:Operator;guest:guest_password:ReadOnly"
    volumes:
      - ./test/redfish-emulator-mocks:/app/api_emulator/redfish/static/:ro
    ports:
      - "8443:443"
    networks:
      rf-network:
        aliases:
          - x0c0s1b0

  ssh-server:
    image: linuxserver/openssh-server:latest
    hostname: x0c0s1b0
    environment:
      PASSWORD_ACCESS: "true"
      USER_NAME: "ADMIN"
      USER_PASSWORD: "ADMIN"
      LISTEN_PORT: "22"
    ports:
      - "2222:22"
    networks:
      console-network:
        aliases:
          - x0c0s1b0

  emulator-loader:
    image: curlimages/curl:latest
    command: >
      sh -c "sleep 10 &&
      curl -X POST http://smd:27779/hsm/v2/Inventory/RedfishEndpoints \
      -H 'Content-Type: application/json' \
      -d '{\"RedfishEndpoints\": [{\"ID\": \"x0c0s1b0\", \"FQDN\": \"x0c0s1b0\", \"RediscoverOnUpdate\": true, \"User\": \"ADMIN\", \"Password\": \"ADMIN\"}]}'"
    depends_on:
      smd:
        condition: service_started
    networks:
      - rcs-network




  remote-console:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RCS_SMD_URL: "http://smd:27779"
      SMS_SERVER: "http://smd:27779"
      CRAY_VAULT_AUTH_PATH: "auth/token/create"
      CRAY_VAULT_ROLE_FILE: "/app/configs/namespace"
      CRAY_VAULT_JWT_FILE: "/app/configs/token"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "hms"
      VAULT_BASE_PATH: "hms-creds"
      VAULT_SKIP_VERIFY: "true"
      VAULT_ENABLED: "true"
      LOG_LEVEL: "DEBUG"
      RCS_NEW_NODE_LOOKUP: "10"
      RCS_CREDS_MONITOR_INTERVAL: "10"
      RCS_CREDS_SECURE_STORAGE_SSH_KEYS_PATH: "hms-creds/bmc-console-keys"
      RCS_CONMAN_PID_FILE_PATH: "/app/remote-console.pid"
      RCS_CONMAN_LOGS_PATH: "/tmp"
    volumes:
      - ./configs/namespace:/app/configs/namespace:ro
      - ./configs/token:/app/configs/token:ro
    ports:
      - "26776:26776"
    networks:
      - rcs-network
      - console-network
    depends_on:
      vault:
        condition: service_healthy
      smd:
        condition: service_started

networks:
  rcs-network:
    driver: bridge
  rf-network:
    driver: bridge
  console-network:
    driver: bridge
