#THIS environment sets up all of RCS
#  All dependencies -> HSM (vault, hm-collector, kafka), RTS (red fish sims) are all setup and active.
#  The RCS binary is active
#  NO ports are exposed to the local system.
#  This will be used for integration testing
networks:
  rcs:
  rcs-rf:
  rcs-console:

services:
  # integration-tests:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.integration.test
  #   environment:
  #     - API_URL=http://remote-console
  #     - API_SERVER_PORT=:28007
  #   depends_on:
  #     - remote-console
  #   networks:
  #     - rcs
  remote-console:
    build:
      context: .
      dockerfile: Dockerfile.integration.Dockerfile
    environment:
      - SMS_SERVER=http://smd:27779
      - CRAY_VAULT_AUTH_PATH=auth/token/create
      - CRAY_VAULT_ROLE_FILE=configs/namespace
      - CRAY_VAULT_JWT_FILE=configs/token
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=hms
      - VAULT_BASE_PATH=hms-creds
      - VAULT_SKIP_VERIFY=true
      - VAULT_ENABLED=true
      - LOG_LEVEL=DEBUG
    depends_on:
      - smd
      - ssh-password-server
      - ssh-key-server
      - ipmi-server
    networks:
      - rcs
      - rcs-console
  vault:
    hostname: vault
    image: docker.io/library/vault:1.5.5
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=hms
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    networks:
      - rcs
      - rcs-console
    ports:
      - "8200:8200"
  vault-kv-enabler:
    build:
      context: .
      dockerfile: vault-kv-enabler.dockerfile
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=hms
      - KV_STORES=hms-creds
    depends_on:
      - vault
    networks:
      - rcs
  postgres:
    hostname: postgres
    image: docker.io/library/postgres:11-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=hmsds
    networks:
      - rcs
  smd-init:
    image: ghcr.io/openchami/smd:2.17
    environment:
      - SMD_DBHOST=postgres
      - SMD_DBPORT=5432
      - SMD_DBNAME=hmsds
      - SMD_DBUSER=${POSTGRES_USER:-postgres}
      - SMD_DBPASS=${POSTGRES_PASSWORD:-postgres}
      - SMD_DBOPTS=sslmode=disable
    depends_on:
      - postgres
    networks:
      - rcs
    command: /smd-init
  smd:
    image: ghcr.io/openchami/smd:2.17
    environment:
      - SMD_DBHOST=postgres
      - SMD_DBPORT=5432
      - SMD_DBNAME=hmsds
      - SMD_DBUSER=${POSTGRES_USER:-postgres}
      - SMD_DBPASS=${POSTGRES_PASSWORD:-postgres}
      - SMD_DBOPTS=sslmode=disable
      - SMD_JWKS_URL=
      - RF_MSG_HOST=kafka:9092:cray-dmtf-resource-event
      - CRAY_VAULT_AUTH_PATH=auth/token/create
      - CRAY_VAULT_ROLE_FILE=configs/namespace
      - CRAY_VAULT_JWT_FILE=configs/token
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=hms
      - VAULT_KEYPATH=hms-creds
      - SMD_WVAULT=true
      - SMD_RVAULT=true
      - SMD_SLS_HOST=
      - SMD_HBTD_HOST=
    volumes:
      - ./configs/namespace:/configs/namespace
      - ./configs/token:/configs/token
    hostname: smd
    depends_on:
      - smd-init
      - vault
    networks:
      - rcs
      - rcs-rf
    ports:
      - "27779:27779"
  vault-key-loader:
    image: docker.io/library/vault:1.5.5
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=hms
      - VAULT_BASE_PATH=hms-creds
    volumes:
      - /home/cjh/.ssh/console-test:/tmp/bmc-console-key:ro
    command: >
      sh -c "
      until vault status 2>/dev/null; do
        echo 'Waiting for vault...'
        sleep 2
      done &&
      ls /tmp/bmc-console-key &&
      vault kv put $$VAULT_BASE_PATH/bmc-console-keys PrivateKey=@/tmp/bmc-console-key
      "
    depends_on:
      - vault
    networks:
      - rcs
  rf-loader:
    image: library/golang:1.24-alpine
    command: >
      sh -c "apk add curl && sleep 10 &&
      curl -X POST -d '{\"RedfishEndpoints\":[{
        \"ID\":\"x0c0s2b0\",
        \"FQDN\":\"x0c0s2b0\",
        \"RediscoverOnUpdate\":true,
        \"User\":\"root\",
        \"Password\":\"root_password\"}
      ]}' http://smd:27779/hsm/v2/Inventory/RedfishEndpoints"
    depends_on:
      - smd
    networks:
      - rcs-rf
  ssh-password-server:
    image: linuxserver/openssh-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_NAME=admin
      - USER_PASSWORD=admin
    ports:
      - 2221:2222
    networks:
      rcs-console:
        aliases:
          - x0c0s0b0

  ssh-key-server:
    image: linuxserver/openssh-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - USER_NAME=n0
      - PUBLIC_KEY=${PUBLIC_KEY}
    ports:
      - 2222:2222
    networks:
      rcs-console:
        aliases:
          - x0c0s1b0

  ipmi-server:
    build:
      context: ./ipmi_sim
    networks:
      rcs-console:
        aliases:
          - x0c0s2b0
    ports:
      - 623:623/udp

  rfemulator0:
    hostname: x0c0s0b0
    image: ghcr.io/openchami/csm-rie:v1.6.7
    environment:
      - MOCKUPFOLDER=EX425
      - MAC_SCHEMA=Mountain
      - XNAME=x0c0s0b0
      - PORT=443
    networks:
      rcs-rf:
        aliases:
          - x0c0s0b0

  rfemulator1:
    hostname: x0c0s1b0
    image: ghcr.io/openchami/csm-rie:v1.6.7
    environment:
      - MOCKUPFOLDER=EX425
      - MAC_SCHEMA=Mountain
      - XNAME=x0c0s1b0
      - PORT=443
    networks:
      rcs-rf:
        aliases:
          - x0c0s1b0

  rfemulator2:
    hostname: x0c0s2b0
    image: ghcr.io/openchami/csm-rie:v1.6.7
    environment:
      - MOCKUPFOLDER=EX425
      - MAC_SCHEMA=Mountain
      - XNAME=x0c0s2b0
      - PORT=443
    networks:
      rcs-rf:
        aliases:
          - x0c0s2b0
